name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dev environment (locked)
        run: uv sync --frozen

      - name: Ruff
        run: uv run ruff check .

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Oldest supported floor and current stable. The floor leg installs
          # with Airflow's official constraint file: unconstrained resolution
          # pairs airflow 3.0 with providers/fastapi versions it never
          # supported, and dag.test() breaks.
          - python: "3.10"
            airflow: "3.0.6"
            constraints: "https://raw.githubusercontent.com/apache/airflow/constraints-3.0.6/constraints-3.10.txt"
          - python: "3.13"
            airflow: "3.3.*"
            constraints: ""
    name: "tests (py${{ matrix.python }} / airflow ${{ matrix.airflow }})"
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install provider + pinned Airflow
        run: |
          uv venv
          if [ -n "${{ matrix.constraints }}" ]; then
            curl -sL -o /tmp/constraints.txt "${{ matrix.constraints }}"
            uv pip install -e . --group dev "apache-airflow==${{ matrix.airflow }}" -c /tmp/constraints.txt
          else
            uv pip install -e . --group dev "apache-airflow==${{ matrix.airflow }}"
          fi

      - name: Unit + failure-mode matrix (tiers 1 and 2)
        run: uv run pytest -v

  e2e:
    # Real scheduler + real Telomere API. Uses the repo-provisioned
    # TELOMERE_API_KEY secret, which fork PRs don't get — hence push-only.
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      TELOMERE_API_KEY: ${{ secrets.TELOMERE_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install e2e test deps
        run: |
          uv venv
          uv pip install pytest requests
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      - name: Run e2e suite (tier 3)
        # run.sh dumps compose logs itself on failure before tearing down
        run: tests/e2e/run.sh
